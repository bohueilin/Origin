[auth]
allowed_redirect_urls = ["http://localhost:5275", "http://localhost:5275/app", "http://localhost:5275/passport", "http://localhost:5283", "http://localhost:5283/app", "http://localhost:5283/passport", "https://origin-physical-ai.pages.dev", "https://origin-physical-ai.pages.dev/app", "https://origin-physical-ai.pages.dev/passport", "https://passport-preview.origin-physical-ai.pages.dev", "https://passport-preview.origin-physical-ai.pages.dev/app", "https://passport-preview.origin-physical-ai.pages.dev/passport"]
require_email_verification = true
verify_email_method = "code"
reset_password_method = "code"
disable_signup = false

[auth.password]
min_length = 6
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false

[auth.smtp]
enabled = false
host = ""
port = 465
username = ""
sender_email = ""
sender_name = ""
min_interval_seconds = 60

[storage]
max_file_size_mb = 50

[realtime]
retention_days = 0

[schedules]
retention_days = 7
