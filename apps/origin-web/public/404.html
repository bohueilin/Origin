<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page not found — Origin</title>
    <meta name="theme-color" content="#f6f5f2" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/home.css?v=23" />
    <style>
      .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; }
      .nf__inner { max-width: 460px; }
      .nf__code { font-family: var(--font-display); font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: var(--signal-ink); }
      .nf h1 { font-size: clamp(28px, 6vw, 40px); margin: 14px 0 12px; }
      .nf p { color: var(--ink-soft); margin-bottom: 26px; }

  <body>
    <main class="nf">
      <div class="nf__inner">
        <p class="nf__code">Error 404</p>
        <h1>This page isn’t in the record.</h1>
        <p>The page you’re looking for doesn’t exist or has moved.</p>
        <a class="btn btn--primary" href="/">Back to Origin</a>
      </div>
    </main>
  </body>
